/* ═══════════════════════════════ AI PRESETS ═══════════════════════════════ */

const AI_PRESETS = {
  balanced:      ['milch','eier','toastbrot','haehnchen','spinat','aepfel','joghurt','spaghetti','zwiebeln','olivenoel'],
  vegan:         ['haferflocken','bananen','aepfel','tomaten_dose','zwiebeln','kidneybohnen','reis','spaghetti','olivenoel','spinat','kartoffeln'],
  'high-protein':['haehnchen','eier','joghurt','quark','gouda','kidneybohnen','spinat','reis','haferflocken'],
  'low-budget':  ['spaghetti','tomaten_dose','zwiebeln','kidneybohnen','reis','toastbrot','bananen','haferflocken','kartoffeln','eier'],
  family:        ['milch','toastbrot','eier','haehnchen','spaghetti','tomaten_frisch','gouda','aepfel','bananen','zwiebeln','reis','butter','joghurt','kartoffeln'],
};

const TRANSPORT = { car:2, transit:4, bike:5, walk:13 };

/* ═══════════════════════════════ HELPERS ═══════════════════════════════ */

const avgPrice = (item) => {
  const vals = Object.values(item.prices||{}).filter(v=>v!=null);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
};

const effectivePrice = (item, storeId) => {
  const sp = item.salePrices?.[storeId];
  const rp = item.prices?.[storeId];
  return sp != null ? sp : rp != null ? rp : null;
};

const bestEffectivePrice = (item, stores) => {
  if (!stores.length) return avgPrice(item);
  const vals = stores.map(s => effectivePrice(item, s.id)).filter(v=>v!=null);
  return vals.length ? Math.min(...vals) : avgPrice(item);
};

const fmt = (n) => (n==null?'—':'€'+(n).toFixed(2).replace('.',','));
const fmtPlain = (n) => (n==null?0:n).toFixed(2).replace('.',',');
const travel = (km, mode) => Math.ceil(km * (TRANSPORT[mode]||2));

/* ═══════════════════════════════ APP ROOT ═══════════════════════════════ */

function App() {
  const [radius,     setRadius]     = useState(3);
  const [transport,  setTransport]  = useState('car');
  const [list,       setList]       = useState([]);
  const [mode,       setMode]       = useState('manual');
  const [query,      setQuery]      = useState('');
  const [dropOpen,   setDropOpen]   = useState(false);
  const [aiForm,     setAiForm]     = useState({budget:60, people:2, days:7, diet:'balanced'});
  const [aiLoading,  setAiLoading]  = useState(false);
  const [aiDone,     setAiDone]     = useState(false);
  const [swapTarget, setSwapTarget] = useState(null);
  const [toast,      setToast]      = useState(null);
  const [listOpen,   setListOpen]   = useState(true);
  const searchRef = useRef(null);

  const visibleStores = useMemo(()=>STORES.filter(s=>s.distance<=radius),[radius]);

  const searchResults = useMemo(()=>
    query.trim().length>0
      ? CATALOG.filter(p=>
          p.name.toLowerCase().includes(query.toLowerCase()) &&
          !list.find(i=>i.id===p.id)
        ).slice(0,7)
      : [],
    [query,list]
  );

  const addItem = useCallback((item)=>{
    setList(prev=>[...prev,{...item}]);
    setQuery(''); setDropOpen(false);
    showToast(`✓ ${item.name} hinzugefügt`);
  },[]);

  const removeItem = useCallback((id)=>{
    setList(prev=>prev.filter(i=>i.id!==id));
    if(swapTarget===id) setSwapTarget(null);
  },[swapTarget]);

  const swapItem = useCallback((fromId, alt)=>{
    const original = list.find(i=>i.id===fromId);
    setList(prev=>prev.map(i=>i.id===fromId
      ? {...alt, category:original?.category||'', alternatives:original?.alternatives||[]}
      : i
    ));
    setSwapTarget(null);
    showToast(`↔ Getauscht gegen ${alt.name}`);
  },[list]);

  const generateAI = useCallback(()=>{
    setAiLoading(true); setAiDone(false);
    setTimeout(()=>{
      const ids = AI_PRESETS[aiForm.diet] || AI_PRESETS.balanced;
      setList(CATALOG.filter(p=>ids.includes(p.id)));
      setAiLoading(false); setAiDone(true); setListOpen(true);
      showToast('🤖 KI-Einkaufsliste erstellt!');
    },1800);
  },[aiForm.diet]);

  const showToast = (msg)=>{ setToast(msg); setTimeout(()=>setToast(null),2800); };

  const storeTotals = useMemo(()=>
    STORES.map(s=>({
      ...s,
      total: list.reduce((sum,item)=>{
        const p = effectivePrice(item, s.id) ?? avgPrice(item);
        return sum + p;
      },0),
      saleCount: list.filter(item=>item.sales?.[s.id]).length,
    })),
    [list]
  );
  const visStoreTotals = storeTotals.filter(s=>s.distance<=radius);
  const bestStore      = visStoreTotals.length ? visStoreTotals.reduce((a,b)=>a.total<b.total?a:b) : null;
  const avgTotal       = list.reduce((s,item)=>s+avgPrice(item),0);
  const savings        = bestStore ? Math.max(0, avgTotal - bestStore.total) : 0;

  useEffect(()=>{
    const h=(e)=>{ if(searchRef.current && !searchRef.current.contains(e.target)) setDropOpen(false); };
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);

  const exportList = ()=>{
    const lines = list.map(i=>`• ${i.name} (${i.detail}) — ${fmt(bestEffectivePrice(i,visibleStores))}`);
    const txt = `GroceryGenius – Einkaufsliste\n${new Date().toLocaleDateString('de-DE')}\n${'─'.repeat(42)}\n${lines.join('\n')}\n${'─'.repeat(42)}\nBestes Geschäft: ${bestStore?.name||'—'}\nGesamtpreis: ${fmt(bestStore?.total)}\nErsparnis: ${fmt(savings)}`;
    const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([txt],{type:'text/plain'})),download:'einkaufsliste.txt'});
    a.click(); URL.revokeObjectURL(a.href);
    showToast('📋 Liste als .txt exportiert!');
  };

  return (
    <div className="min-h-screen" style={{background:'linear-gradient(135deg,#f0fdf4 0%,#fafffe 50%,#fffbeb 100%)'}}>

      {/* TOAST */}
      {toast && (
        <div className="fixed top-4 right-4 z-50 anim-slideDown bg-gray-900 text-white text-sm font-semibold px-4 py-3 rounded-2xl shadow-2xl max-w-xs">
          {toast}
        </div>
      )}

      {/* SWAP MODAL */}
      {swapTarget && (
        <SwapModal
          item={list.find(i=>i.id===swapTarget)}
          visibleStores={visibleStores}
          onClose={()=>setSwapTarget(null)}
          onSwap={swapItem}
        />
      )}

      {/* HEADER */}
      <header className="sticky top-0 z-40 bg-white/85 backdrop-blur-xl border-b border-emerald-100 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-2xl flex items-center justify-center shadow-md" style={{background:'linear-gradient(135deg,#10b981,#059669)'}}>
              <I.Cart size={20} color="white"/>
            </div>
            <div>
              <h1 className="font-extrabold text-gray-900 text-base leading-none tracking-tight">GroceryGenius</h1>
              <p className="text-xs font-semibold text-emerald-500 mt-0.5">Schlau einkaufen — mehr sparen.</p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            {/* Active deals counter */}
            {(() => {
              const totalDeals = list.reduce((n,item) =>
                n + STORES.filter(s => s.distance<=radius && item.sales?.[s.id]).length, 0);
              return totalDeals > 0 ? (
                <div className="flex items-center gap-1.5 bg-red-50 text-red-600 border border-red-200 px-3 py-1.5 rounded-full text-xs font-extrabold sale-glow">
                  <I.Percent size={12}/> {totalDeals} Angebot{totalDeals>1?'e':''}
                </div>
              ) : null;
            })()}
            {list.length>0 && (
              <div className="flex items-center gap-1.5 bg-emerald-50 text-emerald-700 border border-emerald-200 px-3 py-1.5 rounded-full text-xs font-bold">
                <I.Cart size={13}/> {list.length} Artikel
              </div>
            )}
            {savings>0.005 && (
              <div className="hidden sm:flex items-center gap-1.5 bg-amber-50 text-amber-700 border border-amber-200 px-3 py-1.5 rounded-full text-xs font-bold">
                <I.TrendDown size={13}/> Spare {fmt(savings)}
              </div>
            )}
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-5">

          {/* LEFT */}
          <div className="lg:col-span-4 space-y-4">
            <TravelPanel radius={radius} setRadius={setRadius} transport={transport} setTransport={setTransport}/>
            <ListCreator
              mode={mode} setMode={setMode}
              query={query} setQuery={setQuery}
              dropOpen={dropOpen} setDropOpen={setDropOpen}
              searchRef={searchRef} searchResults={searchResults} addItem={addItem}
              aiForm={aiForm} setAiForm={setAiForm}
              aiLoading={aiLoading} aiDone={aiDone} generateAI={generateAI}
            />
          </div>

          {/* RIGHT */}
          <div className="lg:col-span-8 space-y-4">
            {list.length>0 && (
              <ListPanel
                list={list} visibleStores={visibleStores} bestStore={bestStore}
                listOpen={listOpen} setListOpen={setListOpen}
                removeItem={removeItem} setSwapTarget={setSwapTarget}
              />
            )}
            <StorePanel visStoreTotals={visStoreTotals} bestStore={bestStore} list={list} transport={transport} radius={radius}/>
            {list.length>0 && (
              <SummaryPanel bestStore={bestStore} savings={savings} avgTotal={avgTotal} list={list} exportList={exportList}/>
            )}
            {list.length===0 && <EmptyHero mode={mode}/>}
          </div>
        </div>
      </main>
    </div>
  );
}

              <m.Icon size={15} color={transport===m.id?'white':'currentColor'}/>
              <span className="leading-none">{m.label}</span>
            </button>
          ))}
        </div>
      </div>

      <div className="space-y-1.5">
        <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Filialen in der Nähe</p>
        {STORES.map(s=>{
          const inRange = s.distance<=radius;
          const mins = travel(s.distance, transport);
          return (
            <div key={s.id} className={`flex items-center justify-between py-2 px-3 rounded-xl text-sm transition-all ${inRange?'border border-emerald-100 bg-emerald-50':'bg-gray-50 opacity-40 border border-transparent'}`}>
              <div className="flex items-center gap-2">
                <div className={`w-6 h-6 rounded-lg ${s.logoCls} flex items-center justify-center`}>
                  <span className="text-white text-xs font-black">{s.name[0]}</span>
                </div>
                <span className={`font-semibold text-xs ${inRange?'text-gray-800':'text-gray-400'}`}>{s.name}</span>
              </div>
              <div className="flex items-center gap-1.5 text-xs">
                <span className="text-gray-400">{s.distance} km</span>
                {inRange&&<span className="bg-white text-emerald-600 font-bold border border-emerald-200 px-2 py-0.5 rounded-lg">~{mins} min</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════ LIST CREATOR ═══════════════════════════════ */

function ListCreator({ mode, setMode, query, setQuery, dropOpen, setDropOpen, searchRef, searchResults, addItem, aiForm, setAiForm, aiLoading, aiDone, generateAI }) {
  return (
    <div className="card p-5">
      <div className="flex items-center gap-2.5 mb-4">
        <div className="w-8 h-8 rounded-xl bg-amber-100 flex items-center justify-center">
          <I.Cart size={15} color="#d97706"/>
        </div>
        <h2 className="font-bold text-gray-800 text-sm">Einkaufsliste</h2>
      </div>

      <div className="flex gap-1 bg-gray-100 rounded-2xl p-1 mb-4">
        {[{id:'manual',label:'Manuell',Icon:I.Search},{id:'ai',label:'KI-Planer',Icon:I.Sparkles}].map(t=>(
          <button key={t.id} onClick={()=>setMode(t.id)}
            className={`flex-1 flex items-center justify-center gap-1.5 py-2 rounded-xl text-xs font-bold transition-all ${mode===t.id?'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700'}`}>
            <t.Icon size={13}/>{t.label}
          </button>
        ))}

      {mode==='manual'

}

function ManualSearch({ query, setQuery, dropOpen, setDropOpen, searchRef, searchResults, addItem }) {
  return (
    <div ref={searchRef} className="relative">
      <div className={`flex items-center gap-2 border rounded-2xl px-3 py-2.5 transition-all ${dropOpen&&query?'border-emerald-400 ring-2 ring-emerald-100 bg-white':'border-gray-200 bg-gray-50 hover:border-emerald-300'}`}>
        <I.Search size={15} color="#9ca3af"/>
        <input type="text" placeholder="Produkt suchen… z.B. Milch, Eier"
          value={query}
          onChange={e=>{setQuery(e.target.value);setDropOpen(true);}}
          onFocus={()=>setDropOpen(true)}
          className="flex-1 bg-transparent text-sm text-gray-800 placeholder-gray-400 outline-none font-medium"/>
        {query&&<button onClick={()=>{setQuery('');setDropOpen(false);}} className="text-gray-400 hover:text-gray-600"><I.X size={14}/></button>}
      </div>

      {dropOpen&&searchResults.length>0&&(
        <div className="absolute top-full left-0 right-0 mt-1.5 bg-white rounded-2xl shadow-2xl border border-gray-100 overflow-hidden z-30 anim-slideDown">
          {searchResults.map(item=>{
            const minP = Math.min(...Object.values(item.prices).filter(Boolean));
            const hasDeal = Object.values(item.sales||{}).some(Boolean);
            return (
              <button key={item.id} onClick={()=>addItem(item)}
                className="w-full flex items-center justify-between px-3.5 py-3 hover:bg-emerald-50 transition-colors text-left border-b border-gray-50 last:border-0">
                <div>
                  <div className="flex items-center gap-2">
                    <p className="text-sm font-semibold text-gray-800">{item.name}</p>
                    {hasDeal&&<span className="sale-badge text-xs bg-red-500 text-white px-1.5 py-0.5 rounded-md font-black">ANGEBOT</span>}
                  </div>
                  <p className="text-xs text-gray-400 mt-0.5">{item.detail} · {item.category}</p>
                </div>
                <div className="flex items-center gap-2 shrink-0 ml-2">
                  <span className="text-xs font-bold text-emerald-600">ab {fmt(minP)}</span>
                  <div className="w-6 h-6 bg-emerald-100 rounded-full flex items-center justify-center"><I.Plus size={11} color="#10b981"/></div>
                </div>
              </button>
            );
          })}
        </div>
      )}

      {dropOpen&&query.length>0&&searchResults.length===0&&(
        <div className="absolute top-full left-0 right-0 mt-1.5 bg-white rounded-2xl shadow-xl border border-gray-100 px-4 py-6 text-center z-30 anim-slideDown">
          <p className="text-sm text-gray-400">Keine Ergebnisse für „<span className="font-semibold text-gray-600">{query}</span>"</p>
        </div>
      )}
      <p className="text-xs text-gray-400 mt-2 text-center">{CATALOG.length} Produkte im Katalog</p>
    </div>
  );
}

function AIWizard({ aiForm, setAiForm, aiLoading, aiDone, generateAI }) {
  const diets = [
    {id:'balanced',    label:'Ausgewogen',    emoji:'⚖️'},
    {id:'vegan',       label:'Vegan',         emoji:'🌱'},
    {id:'high-protein',label:'Eiweißreich',   emoji:'💪'},
    {id:'low-budget',  label:'Sparmaximum',   emoji:'💰'},
    {id:'family',      label:'Familie',       emoji:'👨‍👩‍👧'},
  ];
  const Ctr = ({label,Icon,col,val,min,max,onChange})=>(
    <div>
      <label className="text-xs font-bold text-gray-600 flex items-center gap-1.5 mb-1.5"><Icon size={13} color={col}/>{label}</label>
      <div className="flex items-center bg-gray-50 border border-gray-200 rounded-xl overflow-hidden">
        <button onClick={()=>onChange(Math.max(min,val-1))} className="w-9 h-9 flex items-center justify-center text-gray-500 hover:bg-gray-200 font-bold text-lg transition-colors">−</button>
        <span className="flex-1 text-center font-extrabold text-gray-800 text-sm">{val}</span>
        <button onClick={()=>onChange(Math.min(max,val+1))} className="w-9 h-9 flex items-center justify-center text-gray-500 hover:bg-gray-200 font-bold text-lg transition-colors">+</button>
      </div>
    </div>
  );
  return (
    <div className="space-y-4">
      <div>
        <label className="text-xs font-bold text-gray-600 flex items-center gap-1.5 mb-2"><I.Banknote size={13} color="#d97706"/> Budget gesamt</label>
        <div className="flex gap-1.5 flex-wrap">
          {[25,50,75,100,150].map(b=>(
            <button key={b} onClick={()=>setAiForm(f=>({...f,budget:b}))}
              className={`px-3 py-1.5 rounded-xl text-xs font-extrabold transition-all ${aiForm.budget===b?'bg-amber-500 text-white shadow-md shadow-amber-200 scale-105':'bg-gray-100 text-gray-600 hover:bg-amber-50 hover:text-amber-600'}`}>
              {fmt(b)}
            </button>
          ))}
        </div>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <Ctr label="Personen" Icon={I.Users} col="#6366f1" val={aiForm.people} min={1} max={10} onChange={v=>setAiForm(f=>({...f,people:v}))}/>
        <Ctr label="Tage"     Icon={I.Clock} col="#6366f1" val={aiForm.days}   min={1} max={30} onChange={v=>setAiForm(f=>({...f,days:v}))}/>
      </div>
      <div>
        <label className="text-xs font-bold text-gray-600 flex items-center gap-1.5 mb-2"><I.Leaf size={13} color="#10b981"/> Ernährungsweise</label>
        <div className="grid grid-cols-2 gap-1.5">
          {diets.map(d=>(
            <button key={d.id} onClick={()=>setAiForm(f=>({...f,diet:d.id}))}
              className={`flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-semibold transition-all ${aiForm.diet===d.id?'bg-emerald-500 text-white shadow-md shadow-emerald-200 scale-[1.02]':'bg-gray-50 text-gray-600 border border-gray-200 hover:bg-emerald-50 hover:text-emerald-600 hover:border-emerald-200'}`}>
              <span>{d.emoji}</span>{d.label}
            </button>
          ))}
        </div>
      </div>
      <button onClick={generateAI} disabled={aiLoading}
        className={`w-full flex items-center justify-center gap-2 py-3 rounded-2xl text-sm font-extrabold transition-all ${aiLoading?'bg-gray-100 text-gray-400 cursor-not-allowed':'btn-primary'}`}>
        {aiLoading?<><I.Spinner size={16} color="#9ca3af"/> KI-Liste wird erstellt…</>:<><I.Sparkles size={16}/> KI-Liste generieren</>}
      </button>
      {aiLoading&&<div className="shimmer-bg h-10 rounded-2xl"/>}
      {aiDone&&!aiLoading&&(
        <div className="flex items-center gap-2 text-xs text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-xl px-3 py-2.5 anim-pop font-semibold">
          <I.Check size={14} color="#10b981"/> Liste bereit · {aiForm.people} Personen · {aiForm.days} Tage · {fmt(aiForm.budget)} Budget
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════ LIST PANEL ═══════════════════════════════ */

function ListPanel({ list, visibleStores, bestStore, listOpen, setListOpen, removeItem, setSwapTarget }) {
  const totalSaleItems = list.filter(item=>visibleStores.some(s=>item.sales?.[s.id])).length;
  return (
    <div className="card overflow-hidden">
      <div className="flex items-center justify-between px-5 py-4 cursor-pointer hover:bg-gray-50/50 transition-colors" onClick={()=>setListOpen(o=>!o)}>
        <div className="flex items-center gap-2.5">
          <div className="w-7 h-7 rounded-lg bg-emerald-100 flex items-center justify-center"><I.Grid size={13} color="#10b981"/></div>
          <h2 className="font-bold text-gray-800 text-sm">Meine Liste</h2>
          <span className="bg-emerald-500 text-white text-xs font-extrabold px-2 py-0.5 rounded-full leading-none">{list.length}</span>
          {totalSaleItems>0&&(
            <span className="sale-badge flex items-center gap-1 bg-red-500 text-white text-xs font-extrabold px-2 py-0.5 rounded-full leading-none">
              <I.Percent size={10} color="white"/> {totalSaleItems} im Angebot
            </span>
          )}
        </div>
        {listOpen?<I.ChevUp size={16} color="#9ca3af"/>:<I.ChevDown size={16} color="#9ca3af"/>}
      </div>
      {listOpen&&(
        <div className="border-t border-gray-50">
          <div className="grid px-4 py-2 bg-gray-50/70" style={{gridTemplateColumns:'1fr auto'}}>
            <span className="text-xs font-bold text-gray-400 uppercase tracking-wider">Produkt</span>
            <span className="text-xs font-bold text-gray-400 uppercase tracking-wider text-right pr-16">Bester Preis</span>
          </div>
          <div className="divide-y divide-gray-50 max-h-[400px] overflow-y-auto">
            {list.map((item,idx)=>(
              <ListRow key={item.id} item={item} idx={idx} visibleStores={visibleStores}
                onRemove={()=>removeItem(item.id)} onSwap={()=>setSwapTarget(item.id)}/>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function ListRow({ item, idx, visibleStores, onRemove, onSwap }) {
  const bestPrice     = bestEffectivePrice(item, visibleStores);
  const regularPrice  = visibleStores.length
    ? Math.min(...visibleStores.map(s=>item.prices?.[s.id]).filter(v=>v!=null))
    : avgPrice(item);

  const saleEntries = visibleStores
    .filter(s=>item.sales?.[s.id])
    .map(s=>({ store:s, label:item.sales[s.id], salePrice:item.salePrices?.[s.id] }));

  const hasSale    = saleEntries.length > 0;
  const maxDiscount= hasSale ? Math.max(...saleEntries.map(e=>e.salePrice!=null ? (regularPrice - e.salePrice) : 0)) : 0;

  return (
    <div className={`flex items-center gap-3 px-4 py-3 transition-all hover:bg-gray-50/70 ${hasSale?'sale-row':''}`}>
      {/* Sale flash strip */}
      {hasSale&&<div className="w-1 self-stretch rounded-full bg-red-400 shrink-0" style={{minHeight:'36px'}}/>}

      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-1.5 flex-wrap">
          <span className="text-sm font-semibold text-gray-800">{item.name}</span>
          {saleEntries.map((e,i)=>(
            <span key={i} className="sale-badge inline-flex items-center gap-1 text-xs bg-red-500 text-white px-2 py-0.5 rounded-lg font-extrabold shadow-sm">
              <I.Percent size={9} color="white"/> {e.label}
              {e.salePrice!=null&&<span className="opacity-75">@ {e.store.name}</span>}
            </span>
          ))}
        </div>
        <div className="flex items-center gap-2 mt-0.5">
          <span className="text-xs text-gray-400">{item.detail}</span>
          <span className="text-xs text-gray-300">·</span>
          <span className="text-xs text-gray-400">{item.category}</span>
        </div>
      </div>

      <div className="flex items-center gap-1.5 shrink-0">
        {visibleStores.length>0&&(
          <div className="text-right min-w-[60px]">
            {hasSale && bestPrice < regularPrice ? (
              <div>
                <del className="text-xs text-gray-400">{fmt(regularPrice)}</del>
                <div className="text-sm font-extrabold text-red-600">{fmt(bestPrice)}</div>
              </div>
            ) : (
              <span className="text-sm font-extrabold text-emerald-600">{fmt(bestPrice)}</span>
            )}
          </div>
        )}
        <button onClick={onSwap}
          className="flex items-center gap-1 px-2.5 py-1.5 bg-violet-50 hover:bg-violet-100 border border-violet-200 text-violet-600 rounded-xl text-xs font-bold transition-all hover:scale-105 active:scale-95">
          <I.Swap size={11}/><span className="hidden sm:inline">Tauschen</span>
        </button>
        <button onClick={onRemove}
          className="w-7 h-7 flex items-center justify-center bg-red-50 hover:bg-red-100 border border-red-200 text-red-400 hover:text-red-600 rounded-xl transition-all hover:scale-105 active:scale-95">
          <I.Trash size={12}/>
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════ SWAP MODAL ═══════════════════════════════ */

function SwapModal({ item, visibleStores, onClose, onSwap }) {
  if(!item) return null;
  const currentPrice = bestEffectivePrice(item, visibleStores);
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4 anim-fadeIn"
      style={{background:'rgba(0,0,0,.45)',backdropFilter:'blur(4px)'}} onClick={onClose}>
      <div className="w-full max-w-sm bg-white rounded-3xl shadow-2xl overflow-hidden anim-slideUp" onClick={e=>e.stopPropagation()}>
        <div className="px-5 pt-5 pb-4 border-b border-gray-100">
          <div className="flex items-start justify-between">
            <div>
              <h3 className="font-extrabold text-gray-900">Alternativen</h3>
              <p className="text-xs text-gray-500 mt-1">
                Tauschen: <span className="font-bold text-gray-700">{item.name}</span>
                {visibleStores.length>0&&<span className="text-emerald-600 font-bold"> · {fmt(currentPrice)}</span>}
              </p>
            </div>
            <button onClick={onClose} className="w-8 h-8 bg-gray-100 hover:bg-gray-200 rounded-full flex items-center justify-center transition-colors">
              <I.X size={14} color="#6b7280"/>
            </button>
          </div>
        </div>
        <div className="p-4 space-y-2.5 max-h-80 overflow-y-auto">
          {(item.alternatives||[]).map((alt,i)=>{
            const altP = visibleStores.length>0
              ? bestEffectivePrice(alt, visibleStores)
              : Math.min(...Object.values(alt.prices||{}).filter(Boolean));
            const diff  = altP - currentPrice;
            const save  = diff < -0.005;
            const pricier= diff >  0.005;
            return (
              <button key={alt.id} onClick={()=>onSwap(item.id,alt)}
                className={`w-full flex items-center justify-between border-2 rounded-2xl p-3.5 transition-all text-left group anim-pop ${save?'bg-emerald-50 border-emerald-200 hover:border-emerald-400':'bg-gray-50 border-gray-100 hover:border-gray-200'}`}
                style={{animationDelay:`${i*60}ms`}}>
                <div>
                  <p className="text-sm font-bold text-gray-800">{alt.name}</p>
                  <p className="text-xs text-gray-400 mt-0.5">{alt.detail}</p>
                </div>
                <div className="text-right shrink-0 ml-3">
                  <p className="text-sm font-extrabold text-gray-800">{fmt(altP)}</p>
                  <p className={`text-xs font-extrabold mt-0.5 ${save?'text-emerald-600':pricier?'text-red-500':'text-gray-400'}`}>
                    {save?`Spare ${fmt(Math.abs(diff))}`:pricier?`+${fmt(diff)}`:'Gleicher Preis'}
                  </p>
                </div>
              </button>
            );
          })}
          {(!item.alternatives||!item.alternatives.length)&&(
            <p className="text-sm text-center text-gray-400 py-4">Keine Alternativen verfügbar.</p>
          )}
        </div>
        <div className="px-4 pb-4">
          <button onClick={onClose} className="w-full py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-semibold rounded-2xl transition-colors">
            Artikel behalten
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════ STORE PANEL ═══════════════════════════════ */

function StorePanel({ visStoreTotals, bestStore, list, transport, radius }) {
  // Collect all active deals across visible stores
  const activeDeals = useMemo(()=>
    list.flatMap(item=>
      STORES.filter(s=>s.distance<=radius && item.sales?.[s.id]).map(s=>({
        item, store:s,
        label: item.sales[s.id],
        regularPrice: item.prices?.[s.id],
        salePrice: item.salePrices?.[s.id],
      }))
    ),
    [list,radius]
  );

  return (
    <div className="card p-5">
      <div className="flex items-center gap-2.5 mb-4">
        <div className="w-8 h-8 rounded-xl bg-violet-100 flex items-center justify-center"><I.Store size={15} color="#7c3aed"/></div>
        <h2 className="font-bold text-gray-800 text-sm">Preisvergleich</h2>
        {visStoreTotals.length===0&&(
          <span className="text-xs text-gray-400 bg-gray-100 px-2.5 py-1 rounded-full font-medium">Radius erhöhen für mehr Filialen</span>
        )}
      </div>

      {visStoreTotals.length===0 ? (
        <div className="flex flex-col items-center py-10 text-gray-400">
          <I.MapPin size={36} color="#d1d5db"/>
          <p className="text-sm font-medium mt-3">Keine Filialen im Umkreis</p>
          <p className="text-xs mt-1">Regler nach rechts verschieben</p>

      ) : (
        <>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
            {visStoreTotals.map(store=>{
              const isBest = bestStore?.id===store.id && list.length>0;
              const mins   = travel(store.distance, transport);
              const diff   = isBest||!bestStore ? 0 : store.total - bestStore.total;
              return (
                <div key={store.id}
                  className={`relative rounded-2xl border-2 p-4 transition-all ${isBest?'border-emerald-400 shadow-lg shadow-emerald-100 scale-[1.03]':'border-gray-100 hover:border-gray-200 hover:shadow-sm'}`}
                  style={isBest?{background:'linear-gradient(135deg,#f0fdf4,#fff)'}:{background:'#fafafa'}}>

                  {isBest&&list.length>0&&(
                    <div className="absolute -top-3.5 left-1/2 -translate-x-1/2 whitespace-nowrap bg-emerald-500 text-white text-xs font-extrabold px-2.5 py-1 rounded-full shadow flex items-center gap-1">
                      <I.Award size={10} color="white"/> Bestes Angebot
                    </div>
                  )}

                  <div className="flex items-center gap-2 mb-3">
                    <div className={`w-9 h-9 ${store.logoCls} rounded-xl flex items-center justify-center text-white font-black text-sm shadow-sm`}>
                      {store.name[0]}
                    </div>
                    <div className="min-w-0">
                      <p className="font-extrabold text-gray-800 text-xs truncate">{store.name}</p>
                      <p className="text-xs text-gray-400 truncate leading-none mt-0.5">{store.tagline}</p>
                    </div>
                  </div>

                  <div className={`text-xl font-extrabold ${isBest?'text-emerald-600':'text-gray-700'}`}>
                    {list.length>0 ? fmt(store.total) : <span className="text-gray-300 text-sm font-medium">Artikel hinzufügen</span>}
                  </div>
                  {list.length>0 && diff>0.005 && (
                    <p className="text-xs text-red-400 font-bold mt-0.5">+{fmt(diff)} mehr</p>
                  )}

                  <div className="flex items-center justify-between mt-2 text-xs text-gray-400">
                    <span className="flex items-center gap-1"><I.MapPin size={10}/>{store.distance} km · {mins} min</span>
                    {store.saleCount>0&&(
                      <span className="sale-badge flex items-center gap-1 bg-red-500 text-white font-extrabold px-1.5 py-0.5 rounded-lg">
                        <I.Percent size={9} color="white"/>{store.saleCount}
                      </span>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── ANGEBOTE DER WOCHE ── */}
          {activeDeals.length>0 && (
            <div className="border-t border-gray-100 pt-4">
              <div className="flex items-center gap-2 mb-3">
                <div className="w-6 h-6 rounded-lg bg-red-100 flex items-center justify-center">
                  <I.Fire size={13} color="#ef4444"/>
                </div>
                <p className="text-xs font-extrabold text-gray-700 uppercase tracking-wider">Angebote dieser Woche</p>
                <span className="sale-badge bg-red-500 text-white text-xs font-extrabold px-2 py-0.5 rounded-full">{activeDeals.length}</span>
              </div>
              <div className="space-y-2">
                {activeDeals.map((d,i)=>(
                  <div key={i} className="flex items-center gap-3 bg-gradient-to-r from-red-50 to-white border border-red-100 rounded-xl px-3 py-2.5 anim-pop" style={{animationDelay:`${i*50}ms`}}>
                    <div className={`w-7 h-7 ${d.store.logoCls} rounded-lg flex items-center justify-center text-white font-black text-xs shrink-0`}>
                      {d.store.name[0]}
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-xs font-bold text-gray-800 truncate">{d.item.name}</p>
                      <p className="text-xs text-gray-400">{d.store.name}</p>
                    </div>
                    <div className="text-right shrink-0">
                      {d.salePrice!=null ? (
                        <div>
                          <del className="text-xs text-gray-400">{fmt(d.regularPrice)}</del>
                          <div className="text-sm font-extrabold text-red-600">{fmt(d.salePrice)}</div>
                        </div>
                      ) : (
                        <span className="text-xs font-extrabold text-red-600 bg-red-100 px-2 py-0.5 rounded-lg">{d.label}</span>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {list.length>0 && activeDeals.length===0&&(
            <div className="border-t border-gray-100 pt-4 text-center text-xs text-gray-400 py-2 flex items-center justify-center gap-1.5">
              <I.Info size={13} color="#9ca3af"/> Keine aktuellen Angebote für deine Artikel in diesem Umkreis
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════ SUMMARY PANEL ═══════════════════════════════ */

function SummaryPanel({ bestStore, savings, avgTotal, list, exportList }) {
  const pct = avgTotal>0 ? savings/avgTotal*100 : 0;
  const totalSaleCount = STORES.reduce((n,s)=>n+list.filter(i=>i.sales?.[s.id]).length,0);
  return (
    <div className="rounded-3xl p-5 text-white relative overflow-hidden" style={{background:'linear-gradient(135deg,#059669 0%,#10b981 50%,#34d399 100%)'}}>
      <div className="absolute -top-8 -right-8 w-32 h-32 rounded-full bg-white/10 pointer-events-none"/>
      <div className="absolute -bottom-10 -left-4 w-24 h-24 rounded-full bg-white/10 pointer-events-none"/>
      <div className="relative">
        <div className="flex items-center gap-2 mb-4">
          <I.Award size={18} color="white"/>
          <h2 className="font-extrabold text-base">Deine Ersparnis-Übersicht</h2>
        </div>

        <div className="grid grid-cols-3 gap-3 mb-4">
          {[
            {label:'Gesamtpreis', value: bestStore ? fmt(bestStore.total) : '—', sub: bestStore?.name || 'Kein Markt'},
            {label:'Du sparst',   value: fmt(savings), sub: `${pct.toFixed(0)}% günstiger`, accent:savings>0.005},
            {label:'Angebote',    value: totalSaleCount, sub: 'auf deine Artikel'},
          ].map((s,i)=>(
            <div key={i} className="bg-white/15 backdrop-blur-sm rounded-2xl p-3 text-center border border-white/20">
              <p className="text-emerald-100 text-xs font-medium mb-1">{s.label}</p>
              <p className={`text-xl font-extrabold ${s.accent?'text-amber-300':'text-white'}`}>{s.value}</p>
              <p className="text-emerald-200 text-xs mt-1 truncate">{s.sub}</p>
            </div>
          ))}
        </div>

        {savings>0.005&&(
          <div className="flex items-center gap-2 bg-white/15 border border-white/20 rounded-2xl px-3 py-2.5 mb-4 text-sm font-semibold">
            <I.TrendDown size={16} color="#fcd34d"/>
            <span>Bei <span className="font-extrabold">{bestStore?.name}</span> sparst du <span className="text-amber-300 font-extrabold">{fmt(savings)}</span> gegenüber dem Durchschnittspreis</span>
          </div>
        )}

        <div className="mb-4">
          <div className="flex justify-between text-xs text-emerald-200 mb-1.5 font-medium">
            <span>Ersparnis-Rate</span><span>{pct.toFixed(0)}%</span>
          </div>
          <div className="h-2.5 bg-white/20 rounded-full overflow-hidden">
            <div className="h-full bg-amber-300 rounded-full transition-all duration-700" style={{width:`${Math.min(100,pct)}%`}}/>
          </div>
        </div>

        <div className="grid grid-cols-2 gap-3">
          <button onClick={exportList} className="btn-ghost flex items-center justify-center gap-2 py-3 text-sm font-bold">
            <I.Download size={16}/> Liste exportieren
          </button>
          <button className="bg-white text-emerald-700 hover:bg-emerald-50 rounded-2xl py-3 text-sm font-extrabold flex items-center justify-center gap-2 shadow-lg transition-all hover:scale-[1.02] active:scale-[.97]">
            <I.Play size={15}/> Einkaufen starten
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════ EMPTY HERO ═══════════════════════════════ */

function EmptyHero({ mode }) {
  return (
    <div className="card border-dashed border-2 border-emerald-200 p-12 flex flex-col items-center text-center">
      <div className="w-16 h-16 rounded-3xl flex items-center justify-center mb-4 shadow-inner" style={{background:'linear-gradient(135deg,#d1fae5,#a7f3d0)'}}>
        <I.Cart size={28} color="#10b981"/>
      </div>
      <h3 className="font-extrabold text-gray-700 text-lg mb-2">Deine Liste ist leer</h3>
      <p className="text-sm text-gray-400 max-w-xs leading-relaxed">
        {mode==='manual'
          ? 'Suche links nach Produkten und vergleiche die Preise bei Aldi, Lidl, REWE und EDEKA sofort.'
          : 'Nutze den KI-Planer links: Budget, Personenzahl und Ernährungsweise eingeben — fertig.'}
      </p>
      <div className="mt-5 flex flex-wrap justify-center gap-2 text-xs">
        {['🥛 Milchprodukte','🍎 Obst','🥩 Fleisch','🍝 Trockenware','🥬 Gemüse','🧀 Käse'].map(c=>(
          <span key={c} className="bg-emerald-50 text-emerald-600 border border-emerald-200 px-3 py-1.5 rounded-full font-semibold">{c}</span>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════ BOOT ═══════════════════════════════ */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
